services:
  db:
    image: mongo:7-alpine
    container_name: uptime-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: uptime-backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://db:27017/uptimemonitor
      - PORT=3000
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: uptime-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
